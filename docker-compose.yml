services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://aqar:aqar123@postgres:5432/aqarize
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: aqarize-db
    restart: always
    environment:
      POSTGRES_USER: aqar
      POSTGRES_PASSWORD: aqar123
      POSTGRES_DB: aqarize
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aqar -d aqarize"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
