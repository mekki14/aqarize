services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aqar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aqar123}
      POSTGRES_DB: ${POSTGRES_DB:-aqarize}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      args:
        DATABASE_URL: ${DATABASE_URL}
    init: true
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_started

volumes:
  postgres_data:
